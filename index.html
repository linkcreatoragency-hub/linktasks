<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<title>Metaperch — Agency Task Manager</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0f1117; --surface:#1a1d27; --surface-2:#232735; --border:#2e3344;
    --text:#e6e8ee; --muted:#9aa0b0; --primary:#6366f1; --primary-d:#4f46e5;
    --green:#22c55e; --amber:#f59e0b; --red:#ef4444; --blue:#3b82f6; --purple:#a855f7;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);overscroll-behavior-y:none;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  .hidden{display:none!important}

  /* ===== App bar ===== */
  .appbar{
    position:sticky;top:0;z-index:30;background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
    display:flex;align-items:center;gap:12px;
  }
  .appbar .logo{
    width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--primary),var(--purple));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;
  }
  .appbar h1{font-size:17px;margin:0;font-weight:700;flex:1;line-height:1.1}
  .appbar h1 small{display:block;font-size:11px;color:var(--muted);font-weight:500}
  .whoami{
    display:flex;align-items:center;gap:8px;background:var(--surface-2);
    border:1px solid var(--border);border-radius:30px;padding:5px 10px 5px 5px;font-size:13px;
  }
  .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:12px;font-weight:700;color:#fff}

  /* sync badge */
  .syncpill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
  .syncpill.cloud{color:var(--green);border-color:rgba(34,197,94,.4)}
  .syncpill.local{color:var(--amber);border-color:rgba(245,158,11,.4)}

  /* ===== Filters ===== */
  .toolbar{
    position:sticky;top:62px;z-index:20;background:var(--bg);
    padding:12px 12px 6px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
  }
  .toolbar::-webkit-scrollbar{display:none}
  .chip{
    white-space:nowrap;font-size:13px;padding:7px 13px;border-radius:30px;
    background:var(--surface);border:1px solid var(--border);color:var(--muted);font-weight:600;
  }
  .chip.active{background:var(--primary-d);color:#fff;border-color:var(--primary-d)}

  .viewtabs{display:flex;gap:6px;padding:0 12px 8px}
  .viewtabs button{flex:1;font-size:13px;padding:8px;border-radius:10px;background:var(--surface);
    border:1px solid var(--border);color:var(--muted);font-weight:600}
  .viewtabs button.active{background:var(--surface-2);color:var(--text);border-color:var(--primary)}

  /* ===== Board ===== */
  main{padding:0 12px 100px}
  .column{margin-bottom:18px}
  .col-head{display:flex;align-items:center;gap:8px;margin:6px 2px 10px}
  .col-head .dot{width:9px;height:9px;border-radius:50%}
  .col-head h2{font-size:14px;margin:0;font-weight:700}
  .col-head .count{font-size:12px;color:var(--muted);background:var(--surface);
    padding:1px 8px;border-radius:20px;border:1px solid var(--border)}

  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:13px 14px;margin-bottom:10px;position:relative;
  }
  .card.overdue{border-color:rgba(239,68,68,.55)}
  .card .title{font-size:15px;font-weight:600;line-height:1.35;margin:0 0 6px;word-break:break-word}
  .card .desc{font-size:13px;color:var(--muted);margin:0 0 10px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .card .tlink{display:inline-block;font-size:13px;color:#93c5fd;text-decoration:none;margin:0 0 7px;word-break:break-all}
  .card .tlink:active{opacity:.7}
  .card .tlink.sheet{color:#86efac;display:block}
  .card .tkw{font-size:12px;color:var(--muted);margin:0 0 8px;word-break:break-word}
  .card .meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;display:inline-flex;align-items:center;gap:4px}
  .tag.assignee{background:var(--surface-2);color:var(--text)}
  .tag.unassigned{background:var(--surface-2);color:var(--muted);font-style:italic}
  .tag.prio-high{background:rgba(239,68,68,.15);color:#fca5a5}
  .tag.prio-med{background:rgba(245,158,11,.15);color:#fcd34d}
  .tag.prio-low{background:rgba(59,130,246,.15);color:#93c5fd}
  .tag.cat{font-weight:700}
  .tag.qc{background:rgba(168,85,247,.15);color:#d8b4fe;font-weight:700}
  .tag.due{background:var(--surface-2);color:var(--muted)}
  .tag.due.soon{color:#fcd34d}
  .tag.due.over{background:rgba(239,68,68,.15);color:#fca5a5}
  .card .row2{display:flex;justify-content:space-between;align-items:center;margin-top:11px;gap:8px}
  .statusbtns{display:flex;gap:5px;flex-wrap:wrap}
  .statusbtns button{font-size:11px;font-weight:700;padding:5px 9px;border-radius:8px;
    background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
  .statusbtns button.cur{color:#fff}
  .iconbtn{font-size:16px;color:var(--muted);padding:4px 6px;border-radius:8px}
  .claimBtn{font-size:11px;font-weight:700;color:#86efac;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4);padding:6px 11px;border-radius:8px;margin-right:6px}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:18px;border:1px dashed var(--border);border-radius:12px}

  /* ===== FAB ===== */
  .fab{
    position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 18px);z-index:40;
    width:58px;height:58px;border-radius:50%;background:var(--primary-d);color:#fff;
    font-size:30px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(79,70,229,.5);
  }

  /* ===== Modal / sheet ===== */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-end}
  .sheet{
    background:var(--surface);width:100%;max-height:92vh;overflow-y:auto;
    border-radius:22px 22px 0 0;padding:18px 18px calc(env(safe-area-inset-bottom) + 22px);
    animation:rise .22s ease;
  }
  @keyframes rise{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet h3{margin:4px 0 16px;font-size:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
  .field input,.field select,.field textarea{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    border-radius:11px;padding:12px;outline:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary)}
  .field textarea{resize:vertical;min-height:64px}
  .twocol{display:flex;gap:12px}.twocol>*{flex:1}
  .prio-pick,.assign-pick{display:flex;gap:8px;flex-wrap:wrap}
  .pick{padding:9px 12px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);
    color:var(--muted);font-size:13px;font-weight:600}
  .pick.sel{border-color:var(--primary);color:#fff;background:var(--primary-d)}
  .actions{display:flex;gap:10px;margin-top:8px}
  .btn{flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:15px}
  .btn.primary{background:var(--primary-d);color:#fff}
  .btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
  .btn.danger{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.4);flex:0 0 auto;padding:14px 18px}

  /* ===== Onboarding ===== */
  .onboard{position:fixed;inset:0;z-index:60;background:var(--bg);display:flex;flex-direction:column;
    justify-content:center;padding:28px;text-align:center}
  .onboard .logo-lg{width:72px;height:72px;border-radius:20px;margin:0 auto 18px;
    background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;
    justify-content:center;font-size:34px;font-weight:800;color:#fff}
  .onboard h2{margin:0 0 6px;font-size:24px}
  .onboard p{color:var(--muted);margin:0 0 26px;font-size:14px;line-height:1.5}
  .team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .team-grid .pick{padding:14px;font-size:15px}
  .login-err{color:#fca5a5;font-size:13px;min-height:18px;margin-bottom:10px;font-weight:600}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:80;
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:11px 18px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.4)}

  /* ===== Manager button + panel ===== */
  .mgrbtn{font-size:12px;font-weight:700;padding:6px 11px;border-radius:20px;border:1px solid var(--primary);
    color:#fff;background:var(--primary-d);white-space:nowrap}
  .chatbtn{font-size:16px;background:var(--surface-2);border:1px solid var(--border);width:34px;height:34px;border-radius:10px;position:relative;flex:0 0 auto}
  .chatbtn .dot{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--red);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface)}
  .chat-overlay{position:fixed;inset:0;z-index:56;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center}
  .chat-sheet{background:var(--bg);width:100%;max-width:760px;height:92vh;display:flex;flex-direction:column;
    border-radius:22px 22px 0 0;overflow:hidden;animation:rise .22s ease}
  .chat-top{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--border)}
  .chat-top h3{margin:0;font-size:17px}
  .chat-tabs{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;flex:0 0 auto}
  .chat-tabs::-webkit-scrollbar{display:none}
  .chat-tab{white-space:nowrap;font-size:13px;padding:7px 13px;border-radius:20px;background:var(--surface);
    border:1px solid var(--border);color:var(--muted);font-weight:600}
  .chat-tab.active{background:var(--primary-d);color:#fff;border-color:var(--primary-d)}
  .ch-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:800;margin-left:5px;vertical-align:middle}
  .chat-msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:9px}
  .msg{max-width:80%;padding:8px 12px;border-radius:14px;font-size:14px;line-height:1.4;word-break:break-word}
  .msg .who{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}
  .msg .when{font-size:10px;opacity:.6;margin-top:4px;text-align:right}
  .msg.them{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
  .msg.me{align-self:flex-end;background:var(--primary-d);color:#fff}
  .chat-empty{color:var(--muted);text-align:center;margin:auto;font-size:13px}
  .chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:var(--bg);flex:0 0 auto}
  .chat-input input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:11px;padding:12px;outline:none}
  .chat-input button{background:var(--primary-d);color:#fff;border-radius:11px;padding:12px 18px;font-weight:700;flex:0 0 auto}
  .avatar.mini{width:20px;height:20px;font-size:10px}
  .mgr-overlay{position:fixed;inset:0;z-index:55;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center}
  .mgr-sheet{background:var(--bg);width:100%;max-width:760px;max-height:94vh;overflow-y:auto;
    border-radius:22px 22px 0 0;padding:0 16px calc(env(safe-area-inset-bottom) + 24px);animation:rise .22s ease}
  .mgr-top{position:sticky;top:0;background:var(--bg);display:flex;align-items:center;justify-content:space-between;
    padding:18px 2px 12px;border-bottom:1px solid var(--border);z-index:2}
  .mgr-top h3{margin:0;font-size:18px}
  .mgr-close{font-size:16px;color:var(--muted);background:var(--surface-2);border:1px solid var(--border);
    width:34px;height:34px;border-radius:10px}
  #mgrBody h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:20px 2px 10px}
  .tablewrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px}
  .mgr-table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
  .mgr-table th{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding:9px 6px;border-bottom:1px solid var(--border)}
  .mgr-table th:first-child{text-align:left;padding-left:12px}
  .mgr-table td{text-align:center;padding:9px 6px;border-bottom:1px solid var(--border)}
  .mgr-table td.mname{text-align:left;padding-left:12px;font-weight:600;white-space:nowrap}
  .mgr-table td.mname .avatar{display:inline-flex;vertical-align:middle;margin-right:7px}
  .mgr-table td.od{color:#fca5a5;font-weight:700}
  .mgr-table tr:last-child td{border-bottom:none}
  .badge-mgr{font-size:9px;font-weight:800;background:var(--primary-d);color:#fff;padding:1px 6px;border-radius:10px;margin-left:6px}
  .att-head{font-size:12px;font-weight:700;margin:12px 2px 7px}
  .att-head.od-h{color:#fca5a5}.att-head.soon-h{color:#fcd34d}
  .att{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);
    border-radius:11px;padding:10px 12px;margin-bottom:7px;cursor:pointer}
  .att-t{flex:1;font-size:13px;font-weight:600;word-break:break-word}
  .att-m{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);white-space:nowrap}
  .att-d{font-size:11px;font-weight:700;white-space:nowrap}
  .att-d.over,.att-d.od{color:#fca5a5}.att-d.soon{color:#fcd34d}
  .muted-row{color:var(--muted);font-size:13px;padding:8px 2px}
  .hint{color:var(--muted);font-size:12px;margin:8px 2px 0}
  .memlist{display:flex;flex-direction:column;gap:8px}
  .mrow{display:flex;align-items:center;justify-content:space-between;background:var(--surface);
    border:1px solid var(--border);border-radius:11px;padding:9px 12px}
  .mrow-n{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px}
  .mrm{font-size:12px;font-weight:700;color:#fca5a5;background:rgba(239,68,68,.12);
    border:1px solid rgba(239,68,68,.35);padding:6px 12px;border-radius:9px}
  .muted-s{color:var(--muted)}
  .addrow{display:flex;gap:8px;margin-top:12px}
  .addrow input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:11px;padding:12px}
  .addrow .btn{flex:0 0 auto;padding:12px 20px}
</style>
</head>
<body>

<!-- ===== Onboarding (pick your name) ===== -->
<div class="onboard" id="onboard">
  <div class="logo-lg">M</div>
  <h2>Metaperch</h2>
  <p>Task manager for your link building team.<br>Who are you?</p>
  <div class="team-grid" id="teamGrid"></div>
  <div class="field" style="text-align:left">
    <label>Or add your name</label>
    <input id="newMemberInput" placeholder="Type your name and press Add">
  </div>
  <button class="btn primary" id="addMemberBtn">Add me to the team</button>
</div>

<!-- ===== Login (cloud) ===== -->
<div class="onboard hidden" id="login">
  <div class="logo-lg">M</div>
  <h2>Metaperch</h2>
  <p>Sign in to your team account.</p>
  <div class="field" style="text-align:left">
    <label>User ID</label>
    <input id="loginUser" placeholder="e.g. robin" autocapitalize="none" autocomplete="username" autocorrect="off">
  </div>
  <div class="field" style="text-align:left">
    <label>Password</label>
    <input id="loginPass" type="password" placeholder="Your password" autocomplete="current-password">
  </div>
  <div id="loginErr" class="login-err"></div>
  <button class="btn primary" id="loginBtn">Sign in</button>
</div>

<!-- ===== App bar ===== -->
<div class="appbar">
  <div class="logo">M</div>
  <h1>Metaperch<small id="teamSub">Link Building Agency</small></h1>
  <span class="syncpill" id="syncPill">…</span>
  <button class="chatbtn" id="chatBtn" title="Team Chat">💬</button>
  <button class="mgrbtn hidden" id="mgrBtn" title="Manager Panel">⚙ Manager</button>
  <div class="whoami" id="whoami" title="Switch user">
    <span class="avatar" id="myAvatar"></span>
    <span id="myName"></span>
  </div>
</div>

<!-- ===== Filters ===== -->
<div class="toolbar" id="assigneeChips"></div>
<div class="viewtabs">
  <button id="tabBoard" class="active">Board</button>
  <button id="tabMine">My Tasks</button>
  <button id="tabDue">Due Soon</button>
</div>

<main id="board"></main>

<button class="fab" id="fab">+</button>

<!-- ===== Task editor sheet ===== -->
<div class="scrim hidden" id="scrim">
  <div class="sheet" id="sheet">
    <h3 id="sheetTitle">New Task</h3>
    <div class="field">
      <label>Task</label>
      <input id="fTitle" placeholder="e.g. Outreach to 20 SaaS blogs">
    </div>
    <div class="field">
      <label>Website URL</label>
      <input id="fWebsite" type="url" placeholder="https://example.com" autocapitalize="none" autocorrect="off">
    </div>
    <div class="field">
      <label>Keywords</label>
      <input id="fKeywords" placeholder="e.g. saas, marketing, b2b">
    </div>
    <div class="field">
      <label>Note (optional)</label>
      <textarea id="fNote" placeholder="Anchor text, contact, instructions…"></textarea>
    </div>
    <div class="field" id="sheetField">
      <label>📊 Spreadsheet URL (live work report)</label>
      <input id="fSheet" type="url" placeholder="https://docs.google.com/spreadsheets/…" autocapitalize="none" autocorrect="off">
    </div>
    <div class="field">
      <label>Category</label>
      <select id="fCategory">
        <option value="">No category</option>
        <option value="Foundational Link">Foundational Link</option>
        <option value="Wiki &amp; Redirect">Wiki &amp; Redirect</option>
        <option value="Premium Guest Posts &amp; Link Insertion">Premium Guest Posts &amp; Link Insertion</option>
        <option value="Internal Guest Posts">Internal Guest Posts</option>
      </select>
    </div>
    <div class="field">
      <label>Assign to</label>
      <div class="assign-pick" id="fAssign"></div>
    </div>
    <div class="field">
      <label>Priority</label>
      <div class="prio-pick" id="fPrio">
        <button class="pick" data-p="high">High</button>
        <button class="pick sel" data-p="med">Medium</button>
        <button class="pick" data-p="low">Low</button>
      </div>
    </div>
    <div class="twocol">
      <div class="field">
        <label>Due date</label>
        <input type="date" id="fDue">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="fStatus">
          <option value="todo">To Do</option>
          <option value="progress">In Progress</option>
          <option value="complete">Complete</option>
          <option value="qc">QC</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost" id="cancelBtn">Cancel</button>
      <button class="btn primary" id="saveBtn">Save Task</button>
    </div>
    <div class="actions" id="deleteRow" style="margin-top:10px">
      <button class="btn danger" id="deleteBtn">Delete task</button>
    </div>
  </div>
</div>

<!-- ===== Manager Panel (Robin only) ===== -->
<div class="mgr-overlay hidden" id="mgrPanel">
  <div class="mgr-sheet">
    <div class="mgr-top"><h3 id="mgrTitle">⚙ Manager Panel</h3><button class="mgr-close" id="mgrClose">✕</button></div>
    <div id="mgrBody"></div>
  </div>
</div>

<!-- ===== Team Chat ===== -->
<div class="chat-overlay hidden" id="chatPanel">
  <div class="chat-sheet">
    <div class="chat-top"><h3>💬 Team Chat</h3><button class="mgr-close" id="chatClose">✕</button></div>
    <div class="chat-tabs" id="chatTabs"></div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input"><input id="chatText" placeholder="Message…" autocomplete="off"><button id="chatSend">Send</button></div>
  </div>
</div>

async function loadData(){
  try{
    const {data,error}=await sb.from("tasks").select("*").order("created_at",{ascending:false});

  await loadMembers();

  if(!window.__rt){
    window.__rt=true;
    sb.channel("tasks-rt").on("postgres_changes",{event:"*",schema:"public",table:"tasks"},
      async()=>{const {data}=await sb.from("tasks").select("*").order("created_at",{ascending:false});
        if(data){tasks=data.map(fromRow);render();if(managerOpen)renderManager();}}).subscribe();
    sb.channel("members-rt").on("postgres_changes",{event:"*",schema:"public",table:"members"},
      async()=>{await loadMembers();buildAssigneeChips();render();if(managerOpen)renderManager();}).subscribe();
    sb.channel("messages-rt").on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},
      (payload)=>{ if(payload && payload.new) onNewMessage(payload.new); }).subscribe();

function toRow(t){return{id:t.id,title:t.title,website_url:t.website||null,keywords:t.keywords||null,note:t.note||null,category:t.category||null,sheet_url:t.sheet||null,assignee:t.assignee||null,

async function persist(task,action){

    try{
      if(action==="delete")await sb.from("tasks").delete().eq("id",task.id);

/* ---------- members + manager panel ---------- */
async function loadMembers(){

    try{
      const {data,error}=await sb.from("members").select("*").order("created_at",{ascending:true});

function memberUsername(m){return (m.username||String(m.name||"").toLowerCase().split(/\s+/)[0]);}
async function loadCategoryAccess(){
  catAccess={};
  if(!cloud)return;
  try{
    const {data}=await sb.from("category_access").select("*");
    (data||[]).forEach(r=>{(catAccess[r.category]=catAccess[r.category]||[]).push(r.username);});

// Build the Assign To pills, filtered to the selected category's members.
function renderAssignPills(category, keepCurrent){
  const fa=$("#fAssign");if(!fa)return;fa.innerHTML="";
  let list;
  if(me===ADMIN){
    list=members.map(m=>m.name); // admin can assign to anyone, including the Manager
  }else if(category && catAccess[category] && catAccess[category].length){
    const allowed=new Set(catAccess[category]);
    list=members.filter(m=>allowed.has(memberUsername(m))).map(m=>m.name);
  }else{ list=members.map(m=>m.name); }
  if(!list.length) list=members.map(m=>m.name);
  // when opening an existing task, keep its current assignee available even if outside the category
  if(keepCurrent && pickedAssignee && !list.includes(pickedAssignee) && members.some(m=>m.name===pickedAssignee)){
    list=[pickedAssignee,...list];
  }
  // if a member is picked but not in the list, fall back to Unassigned
  if(pickedAssignee && !list.includes(pickedAssignee)) pickedAssignee="";
  const mk=(label,val)=>{const b=document.createElement("button");b.className="pick"+(val===pickedAssignee?" sel":"");
    b.textContent=label;b.onclick=()=>{pickedAssignee=val;
      fa.querySelectorAll(".pick").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");};fa.appendChild(b);};
  mk("Unassigned","");   // tasks can be left unassigned; members self-assign later
  list.forEach(n=>mk(n,n));
}

let managerOpen=false;
function openManager(){managerOpen=true;const mt=$("#mgrTitle");if(mt)mt.textContent=(me===ADMIN?"⚙ Admin Dashboard":"⚙ Manager Panel");renderManager();$("#mgrPanel").classList.remove("hidden");}
function closeManager(){managerOpen=false;$("#mgrPanel").classList.add("hidden");}

function statsFor(name){
  const t=tasks.filter(x=>x.assignee===name);
  const by=s=>t.filter(x=>x.status===s).length;
  const overdue=t.filter(x=>x.due&&x.status!=="done"&&daysUntil(x.due)<0).length;
  const done=by("done"),total=t.length;
  return {total,todo:by("todo"),progress:by("progress"),review:by("review"),done,overdue,comp:total?Math.round(done/total*100):0};
}

async function addMember(){
  const inp=$("#newMgrMember");if(!inp)return;
  const name=inp.value.trim();if(!name)return;
  if(team.includes(name)){toast("Already on the team");return;}
  const m={id:uid(),name};
  if(cloud){try{const {error}=await sb.from("members").insert({id:m.id,name:m.name});if(error)throw error;}catch(e){toast("Couldn't add (sync error)");return;}}
  members.push(m);team=members.map(x=>x.name);
  if(!cloud)localStorage.setItem("lt_team",JSON.stringify(team));
  inp.value="";buildAssigneeChips();renderManager();render();toast("Added "+name);
}
async function removeMember(id){
  const m=members.find(x=>x.id===id);if(!m)return;
  if(m.name===MANAGER){toast("Can't remove the manager");return;}
  if(cloud){try{const {error}=await sb.from("members").delete().eq("id",id);if(error)throw error;}catch(e){toast("Couldn't remove (sync error)");return;}}
  members=members.filter(x=>x.id!==id);team=members.map(x=>x.name);
  if(!cloud)localStorage.setItem("lt_team",JSON.stringify(team));
  buildAssigneeChips();renderManager();render();toast("Removed "+m.name);

function renderManager(){
  const body=$("#mgrBody");if(!body)return;
  const rows=team.map(n=>{const s=statsFor(n);return `<tr>
    <td class="mname"><span class="avatar mini" style="background:${colorFor(n)}">${initials(n)}</span>${esc(n)}${n===MANAGER?'<span class="badge-mgr">Mgr</span>':''}</td>
    <td>${s.todo}</td><td>${s.progress}</td><td>${s.review}</td><td>${s.done}</td>
    <td class="${s.overdue?'od':''}">${s.overdue}</td><td><b>${s.total}</b></td><td>${s.comp}%</td></tr>`;}).join("");
  const open=tasks.filter(t=>t.status!=="done"&&t.due);
  const overdue=open.filter(t=>daysUntil(t.due)<0).sort((a,b)=>(a.due||"").localeCompare(b.due||""));
  const soon=open.filter(t=>daysUntil(t.due)>=0&&daysUntil(t.due)<=3).sort((a,b)=>(a.due||"").localeCompare(b.due||""));
  const item=t=>{const dl=dueLabel(t.due);return `<div class="att" data-id="${t.id}">

    <span class="att-d ${dl.cls}">${dl.txt}</span></div>`;};
  const memList=members.map(m=>`<div class="mrow">
    <span class="mrow-n"><span class="avatar mini" style="background:${colorFor(m.name)}">${initials(m.name)}</span>${esc(m.name)}${m.name===MANAGER?'<span class="badge-mgr">Mgr</span>':''}</span>
    ${m.name===MANAGER?'<span class="muted-s">—</span>':`<button class="mrm" data-id="${m.id}">Remove</button>`}</div>`).join("");
  body.innerHTML=`
    <h4>Team overview</h4>
    <div class="tablewrap"><table class="mgr-table">
      <thead><tr><th>Member</th><th>To-Do</th><th>Prog</th><th>Rev</th><th>Done</th><th>Over</th><th>Total</th><th>%</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <h4>Needs attention</h4>
    <div class="att-head od-h">Overdue · ${overdue.length}</div>
    ${overdue.length?overdue.map(item).join(""):'<div class="muted-row">Nothing overdue 🎉</div>'}
    <div class="att-head soon-h">Due soon (≤3 days) · ${soon.length}</div>
    ${soon.length?soon.map(item).join(""):'<div class="muted-row">Nothing due soon</div>'}
    <p class="hint">Tip: tap any task above to reassign, edit, or delete it.</p>
    <h4>Manage team</h4>
    <div class="memlist">${memList}</div>
    <div class="addrow"><input id="newMgrMember" placeholder="Add a team member" autocomplete="off"><button class="btn primary" id="mgrAddBtn">Add</button></div>`;
  body.querySelectorAll(".att").forEach(el=>el.onclick=()=>{const t=tasks.find(x=>x.id===el.dataset.id);if(t){closeManager();openEditor(t);}});
  body.querySelectorAll(".mrm").forEach(b=>b.onclick=()=>removeMember(b.dataset.id));
  const ab=$("#mgrAddBtn");if(ab)ab.onclick=addMember;
  const ni=$("#newMgrMember");if(ni)ni.addEventListener("keydown",e=>{if(e.key==="Enter")addMember();});

$("#mgrBtn").onclick=openManager;

/* ---------- team chat ---------- */
let chatOpen=false, chatChannel="general", shownMsgIds=new Set(), unread={}, _audioCtx=null;
const CHANNEL_SHORT={"Foundational Link":"Foundational","Wiki & Redirect":"Wiki","Premium Guest Posts & Link Insertion":"Premium","Internal Guest Posts":"Internal"};
function visibleChannels(){
  const ch=[{id:"general",name:"General"}];
  const seesAll=(me===MANAGER||me===ADMIN);
  CATEGORIES.forEach(cat=>{
    if(seesAll || (catAccess[cat] && catAccess[cat].includes(meUser))) ch.push({id:cat,name:CHANNEL_SHORT[cat]||cat});
  });
  return ch;
}
function getSeen(){ try{return JSON.parse(localStorage.getItem("lt_seen")||"{}");}catch(e){return {};} }
function setSeen(ch,iso){ const s=getSeen(); s[ch]=iso; try{localStorage.setItem("lt_seen",JSON.stringify(s));}catch(e){} }
async function computeUnread(){
  const seen=getSeen();
  for(const c of visibleChannels()){
    const since=seen[c.id]||"1970-01-01T00:00:00Z";
    try{ const {count}=await sb.from("messages").select("id",{count:"exact",head:true}).eq("channel",c.id).gt("created_at",since); unread[c.id]=count||0; }
    catch(e){ unread[c.id]=0; }
  }
  updateChatBtn(); if(chatOpen) renderChannelTabs();
}
function playBeep(){
  try{
    _audioCtx=_audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(_audioCtx.state==="suspended") _audioCtx.resume();
    const ctx=_audioCtx, o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine"; o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(660,ctx.currentTime); o.frequency.setValueAtTime(880,ctx.currentTime+0.09);
    g.gain.setValueAtTime(0.07,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.28);
    o.start(); o.stop(ctx.currentTime+0.3);
  }catch(e){}
}
function chatAlert(m){
  playBeep();
  const chName=(CHANNEL_SHORT[m.channel]||(m.channel==="general"?"General":m.channel));
  notify("💬 "+(m.sender_name||m.sender_username)+" · "+chName, m.body);
}
function updateChatBtn(){ const b=$("#chatBtn"); if(!b)return; const total=Object.values(unread).reduce((a,n)=>a+(n||0),0);
  b.innerHTML="💬"+(total>0?`<span class="dot">${total>9?"9+":total}</span>`:""); }
function openChat(){ chatOpen=true; updateChatBtn(); $("#chatPanel").classList.remove("hidden"); renderChannelTabs(); openChannel(chatChannel); setTimeout(()=>{const i=$("#chatText");if(i)i.focus();},100); }
function closeChat(){ chatOpen=false; $("#chatPanel").classList.add("hidden"); }
function renderChannelTabs(){
  const wrap=$("#chatTabs"); if(!wrap)return; wrap.innerHTML="";
  const chs=visibleChannels();
  if(!chs.some(c=>c.id===chatChannel)) chatChannel="general";
  chs.forEach(c=>{ const b=document.createElement("button"); b.className="chat-tab"+(c.id===chatChannel?" active":"");
    const u=unread[c.id]||0; b.innerHTML=esc(c.name)+(u>0?` <span class="ch-badge">${u>99?"99+":u}</span>`:"");
    b.onclick=()=>{ chatChannel=c.id; renderChannelTabs(); openChannel(c.id); }; wrap.appendChild(b); });
}
async function openChannel(channel){
  chatChannel=channel;
  const box=$("#chatMsgs"); if(!box)return;
  box.innerHTML='<div class="chat-empty">Loading…</div>'; shownMsgIds=new Set();
  let data=[];
  try{ const r=await sb.from("messages").select("*").eq("channel",channel).order("created_at",{ascending:true}).limit(300); data=r.data||[]; }catch(e){}
  if(chatChannel!==channel) return; // user switched while loading
  box.innerHTML="";
  if(!data.length){ box.innerHTML='<div class="chat-empty">No messages yet. Say hi 👋</div>'; markChannelSeen(channel); return; }
  data.forEach(m=>appendMessage(m,true));
  scrollChatBottom();
  markChannelSeen(channel);
}
function markChannelSeen(channel){ setSeen(channel,new Date().toISOString()); unread[channel]=0; updateChatBtn(); renderChannelTabs(); }
function appendMessage(m, bulk){
  if(shownMsgIds.has(m.id)) return; shownMsgIds.add(m.id);
  const box=$("#chatMsgs"); if(!box)return;
  const empty=box.querySelector(".chat-empty"); if(empty) empty.remove();
  const mine=(m.sender_username===meUser);
  const d=document.createElement("div"); d.className="msg "+(mine?"me":"them");
  const time=m.created_at?new Date(m.created_at).toLocaleString(undefined,{hour:"2-digit",minute:"2-digit",month:"short",day:"numeric"}):"";
  d.innerHTML=`${mine?"":`<div class="who">${esc(m.sender_name||m.sender_username)}</div>`}<div>${esc(m.body)}</div><div class="when">${time}</div>`;
  box.appendChild(d);
  if(!bulk) scrollChatBottom();
}
function scrollChatBottom(){ const box=$("#chatMsgs"); if(box) box.scrollTop=box.scrollHeight; }
async function sendMessage(){
  const inp=$("#chatText"); if(!inp)return; const body=(inp.value||"").trim(); if(!body)return;
  const m={id:uid(),channel:chatChannel,sender_username:meUser,sender_name:me,body,created_at:new Date().toISOString()};
  inp.value=""; appendMessage(m);
  try{ const {error}=await sb.from("messages").insert({id:m.id,channel:m.channel,sender_username:m.sender_username,sender_name:m.sender_name,body:m.body}); if(error)throw error; }
  catch(e){ toast("Message failed to send"); }
}
function onNewMessage(m){
  if(chatOpen && m.channel===chatChannel){ appendMessage(m); setSeen(m.channel,new Date().toISOString()); return; }
  if(m.sender_username===meUser) return; // ignore echoes of my own messages
  unread[m.channel]=(unread[m.channel]||0)+1;
  updateChatBtn(); if(chatOpen) renderChannelTabs();
  chatAlert(m);
}
$("#chatBtn").onclick=openChat;
$("#chatClose").onclick=closeChat;
$("#chatPanel").onclick=e=>{ if(e.target===$("#chatPanel")) closeChat(); };
$("#chatSend").onclick=sendMessage;
$("#chatText").addEventListener("keydown",e=>{ if(e.key==="Enter") sendMessage(); });

function buildAssigneeChips(){
  const wrap=$("#assigneeChips");wrap.innerHTML="";
  const all=document.createElement("button");all.className="chip active";all.textContent="Everyone";
  all.onclick=()=>{filterAssignee="all";refreshChips();render();};wrap.appendChild(all);

/* view tabs */
$("#tabBoard").onclick=()=>setView("board");
$("#tabMine").onclick=()=>setView("mine");
$("#tabDue").onclick=()=>setView("due");
function setView(v){view=v;
  ["Board","Mine","Due"].forEach(x=>$("#tab"+x).classList.toggle("active",x.toLowerCase()===v||(v==="board"&&x==="Board")));
  $("#tabBoard").classList.toggle("active",v==="board");
  $("#tabMine").classList.toggle("active",v==="mine");
  $("#tabDue").classList.toggle("active",v==="due");
  render();}

/* ---------- render ---------- */
function visibleTasks(){
  let list=tasks.slice();
  if(filterAssignee!=="all")list=list.filter(t=>t.assignee===filterAssignee);
  if(view==="mine")list=list.filter(t=>t.assignee===me);
  if(view==="due"){list=list.filter(t=>t.due&&t.status!=="done"&&daysUntil(t.due)<=3)
    .sort((a,b)=>(a.due||"").localeCompare(b.due||""));}
  return list;
}

function notify(title, body){
  if("Notification" in window && Notification.permission==="granted"){
    try{ new Notification(title, {body, icon:"icon-192.png"}); }catch(e){}
  }
  toast(title);
}
// Detect status transitions and alert the right person (QC reviewer on Complete, Manager on Done)
function checkTransitions(){
  tasks.forEach(t=>{
    const prev=lastStatus[t.id];
    if(statusInit && prev!==undefined && prev!==t.status){
      if(t.status==="complete"){
        const qc=qcReviewerFor(t);
        if(qc && qc===me) notify("🔍 QC needed", "'"+t.title+"' is ready for your QC (by "+t.assignee+")");
      }else if(t.status==="done"){
        if(me===MANAGER||me===ADMIN) notify("✅ Task Done", "'"+t.title+"' marked Done — "+t.assignee);
      }
    }
    lastStatus[t.id]=t.status;
  });
  statusInit=true;
}

function render(){
  checkTransitions();
  const board=$("#board");board.innerHTML="";
  const list=visibleTasks();

  if(view==="due"){
    const col=document.createElement("div");col.className="column";
    if(!list.length){board.innerHTML=`<div class="empty">Nothing due in the next 3 days 🎉</div>`;return;}
    list.forEach(t=>col.appendChild(taskCard(t)));board.appendChild(col);return;
  }

  STATUSES.forEach(s=>{
    const items=list.filter(t=>t.status===s.key);
    const col=document.createElement("div");col.className="column";
    col.innerHTML=`<div class="col-head"><span class="dot" style="background:${s.color}"></span>
      <h2>${s.label}</h2><span class="count">${items.length}</span></div>`;
    if(!items.length){const e=document.createElement("div");e.className="empty";e.textContent="No tasks";col.appendChild(e);}
    items.sort((a,b)=>(a.due||"9999").localeCompare(b.due||"9999"))
         .forEach(t=>col.appendChild(taskCard(t)));
    board.appendChild(col);
  });
}

function taskCard(t){
  const c=document.createElement("div");c.className="card";
  const dl=dueLabel(t.due);
  const overdue=t.due&&t.status!=="done"&&daysUntil(t.due)<0;
  if(overdue)c.classList.add("overdue");
  const prioMap={high:["prio-high","High"],med:["prio-med","Medium"],low:["prio-low","Low"]};
  const pm=prioMap[t.priority]||prioMap.med;

  c.innerHTML=`
    <p class="title">${esc(t.title)}</p>
    ${safeUrl(t.website)?`<a class="tlink" href="${esc(safeUrl(t.website))}" target="_blank" rel="noopener noreferrer">🔗 ${esc(shortUrl(t.website))}</a>`:""}
    ${safeUrl(t.sheet)?`<a class="tlink sheet" href="${esc(safeUrl(t.sheet))}" target="_blank" rel="noopener noreferrer">📊 Live report</a>`:""}
    ${t.keywords?`<p class="tkw">🔑 ${esc(t.keywords)}</p>`:""}
    ${t.note?`<p class="desc">${esc(t.note)}</p>`:""}
    <div class="meta">
      ${t.category?`<span class="tag cat" style="color:${catColor(t.category)};border:1px solid ${catColor(t.category)}66;background:${catColor(t.category)}1a">${esc(t.category)}</span>`:""}
      ${t.assignee?`<span class="tag assignee"><span class="avatar" style="width:18px;height:18px;font-size:10px;background:${colorFor(t.assignee)}">${initials(t.assignee)}</span>${esc(t.assignee)}</span>`:`<span class="tag unassigned">Unassigned</span>`}
      <span class="tag ${pm[0]}">${pm[1]}</span>
      ${qcReviewerFor(t)?`<span class="tag qc">🔍 QC: ${esc(qcReviewerFor(t))}</span>`:""}
      ${dl?`<span class="tag due ${dl.cls}">⏰ ${dl.txt}</span>`:""}
    </div>
    <div class="row2">
      <div class="statusbtns">
        ${STATUSES.map(s=>`<button data-s="${s.key}" class="${t.status===s.key?'cur':''}"
          style="${t.status===s.key?`background:${s.color};border-color:${s.color}`:''}">${s.label}</button>`).join("")}
      </div>
      ${canClaim(t)?`<button class="claimBtn">＋ Claim</button>`:""}
      <button class="iconbtn editBtn">✏️</button>
    </div>`;
  const cb=c.querySelector(".claimBtn"); if(cb) cb.onclick=()=>claimTask(t);
  c.querySelectorAll(".statusbtns button").forEach(b=>{
    b.onclick=()=>{ const ns=b.dataset.s;
      if(blockCompleteNoSheet(t.category,t.sheet,ns)){openEditor(t);return;}
      t.status=ns;persist(t,"update");render();
      if(ns==="done")toast("Marked done ✅");};});
  c.querySelector(".editBtn").onclick=()=>openEditor(t);
  return c;
}
function esc(s){return(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function safeUrl(u){if(!u)return null;u=String(u).trim();if(/^https?:\/\//i.test(u))return u;if(/^[\w-]+(\.[\w-]+)+(\/.*)?$/.test(u))return "https://"+u;return null;}
function shortUrl(u){return String(u||"").replace(/^https?:\/\//i,"").replace(/\/+$/,"");}
function canClaim(t){ return !!(t && !t.assignee && t.category && catAccess[t.category] && catAccess[t.category].includes(meUser)); }
function claimTask(t){ t.assignee=me; persist(t,"update"); render(); toast("Claimed: "+t.title); }
// Foundational Link tasks need a live-report spreadsheet link before they can be marked Complete.
function blockCompleteNoSheet(category, sheet, newStatus){
  if(newStatus==="complete" && category==="Foundational Link" && !(sheet && String(sheet).trim())){
    toast("📊 Add the Spreadsheet (live report) link before marking Complete");
    return true;
  }
  return false;
}

/* ---------- editor ---------- */
let pickedPrio="med",pickedAssignee="";
function openEditor(task){
  editingId=task?task.id:null;
  $("#sheetTitle").textContent=task?"Edit Task":"New Task";
  $("#fTitle").value=task?task.title:"";
  $("#fWebsite").value=task?(task.website||""):"";
  $("#fKeywords").value=task?(task.keywords||""):"";
  $("#fNote").value=task?(task.note||""):"";
  $("#fCategory").value=task?(task.category||""):"";
  $("#fSheet").value=task?(task.sheet||""):"";
  // Manager/Admin always; the task's own assignee can also edit the live-report sheet link.
  canEditSheet=(me===MANAGER||me===ADMIN||(!!task && task.assignee===me));
  $("#sheetField").style.display=canEditSheet?"block":"none";
  $("#fDue").value=task?(task.due||""):"";
  $("#fStatus").value=task?task.status:"todo";
  pickedPrio=task?task.priority:"med";
  pickedAssignee=task?(task.assignee||""):"";
  // priority
  $("#fPrio").querySelectorAll(".pick").forEach(b=>b.classList.toggle("sel",b.dataset.p===pickedPrio));
  // assignees (filtered to the selected category's members)
  renderAssignPills($("#fCategory").value, true);
  $("#deleteRow").style.display=task?"flex":"none";
  $("#scrim").classList.remove("hidden");
}
$("#fPrio").querySelectorAll(".pick").forEach(b=>{
  b.onclick=()=>{pickedPrio=b.dataset.p;
    $("#fPrio").querySelectorAll(".pick").forEach(x=>x.classList.toggle("sel",x===b));};});

$("#fCategory").addEventListener("change",()=>renderAssignPills($("#fCategory").value, false));
$("#fab").onclick=()=>openEditor(null);
$("#cancelBtn").onclick=closeSheet;
$("#scrim").onclick=e=>{if(e.target===$("#scrim"))closeSheet();};
function closeSheet(){$("#scrim").classList.add("hidden");editingId=null;}

$("#saveBtn").onclick=()=>{
  const title=$("#fTitle").value.trim();
  if(!title){toast("Add a task title");return;}
  let t = editingId ? tasks.find(x=>x.id===editingId) : null;
  const newCategory=$("#fCategory").value;
  const newStatus=$("#fStatus").value;
  const newSheet=canEditSheet?$("#fSheet").value.trim():((t&&t.sheet)||"");
  if(blockCompleteNoSheet(newCategory,newSheet,newStatus))return; // can't go Complete without a sheet (Foundational)
  if(!t){t={id:uid(),created_at:new Date().toISOString()};tasks.unshift(t);}
  t.title=title;t.website=$("#fWebsite").value.trim();t.keywords=$("#fKeywords").value.trim();t.note=$("#fNote").value.trim();t.category=newCategory;t.assignee=pickedAssignee;
  if(canEditSheet) t.sheet=$("#fSheet").value.trim(); // manager/admin or the task's assignee set the live-report sheet
  t.priority=pickedPrio;t.due=$("#fDue").value||null;t.status=newStatus;
  persist(t,"update");closeSheet();render();toast(editingId?"Task updated":"Task created");
};
$("#deleteBtn").onclick=()=>{
  if(!editingId)return;
  const t=tasks.find(x=>x.id===editingId);
  tasks=tasks.filter(x=>x.id!==editingId);
  persist(t,"delete");closeSheet();render();toast("Task deleted");
};

/* ---------- reminders ---------- */
function requestNotify(){
  if("Notification" in window && Notification.permission==="default"){
    setTimeout(()=>Notification.requestPermission(),3000);
  }
  checkReminders();
  setInterval(checkReminders,60*60*1000); // hourly
}
function checkReminders(){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  const mine=tasks.filter(t=>t.assignee===me&&t.status!=="done"&&t.due);
  const due=mine.filter(t=>{const n=daysUntil(t.due);return n!==null&&n<=1;});
  const sentKey="lt_notified_"+new Date().toDateString();
  if(due.length && !localStorage.getItem(sentKey)){
    localStorage.setItem(sentKey,"1");
    new Notification("Metaperch — "+due.length+" task(s) due",{
      body:due.slice(0,3).map(t=>"• "+t.title).join("\n"),icon:"icon-192.png"});
  }
}

/* ---------- service worker ---------- */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

init();
</script>
